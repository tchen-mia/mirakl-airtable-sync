name: Book Orders

on:
  schedule:
    - cron: '*/5 11-23 * * *'  # Every 5 min, business hours (7am-11pm ET)
    - cron: '*/5 0-3 * * *'    # Every 5 min, business hours continued
    - cron: '0 4-10 * * *'     # Every hour, outside business hours
  workflow_dispatch:

jobs:
  book-orders:
    name: Create Shopify orders from Airtable book order tables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run book orders
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_API_TOKEN: ${{ secrets.SHOPIFY_API_TOKEN }}
          BOOK_ORDER_TABLES: ${{ secrets.BOOK_ORDER_TABLES }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_BOOKS: ${{ secrets.SMTP_FROM_BOOKS }}
          BOOK_ORDER_INVOICE_FIELDS: ${{ secrets.BOOK_ORDER_INVOICE_FIELDS }}
        run: python book_orders.py
