name: Book Orders

on:
  schedule:
    # Every 10 min, offset off the top of the hour. GitHub heavily throttles/drops
    # high-frequency (*/5) and top-of-hour (0 *) scheduled runs; a moderate, offset
    # cadence fires far more reliably and still keeps latency under ~15 min.
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

# Never let two runs execute at once. The script's only first-line duplicate guard
# is the Airtable filter, so overlapping runs could both create a Shopify order.
# Queue (do not cancel) — cancelling mid-run could itself orphan an order.
concurrency:
  group: book-orders
  cancel-in-progress: false

jobs:
  book-orders:
    name: Create Shopify orders from Airtable book order tables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run book orders
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_API_TOKEN: ${{ secrets.SHOPIFY_API_TOKEN }}
          BOOK_ORDER_TABLES: ${{ secrets.BOOK_ORDER_TABLES }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_BOOKS: ${{ secrets.SMTP_FROM_BOOKS }}
          BOOK_ORDER_INVOICE_FIELDS: ${{ secrets.BOOK_ORDER_INVOICE_FIELDS }}
          ERROR_EMAIL_TO: ${{ secrets.ERROR_EMAIL_TO }}
        run: python book_orders.py
