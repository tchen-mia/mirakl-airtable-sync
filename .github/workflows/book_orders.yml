name: Book Orders

on:
  schedule:
    # These are only "start attempts" — GitHub throttles this repo's scheduled
    # events down to ~6/day no matter the cron (verified empirically), so we don't
    # rely on each tick firing. Instead, whichever ticks DO fire each launch a
    # long-running job that loops internally every 10 min (see the run step below).
    # Frequent attempts (offset off the top of the hour) just maximize the chance a
    # fresh loop starts every few hours.
    - cron: '8,38 * * * *'
  workflow_dispatch:

# Keep one loop alive at a time. cancel-in-progress: true lets a fresh start cleanly
# replace the running loop. This is safe because book_orders.py is now idempotent:
# if a run is cancelled between creating a Shopify order and writing the ID back to
# Airtable, find_existing_order() recovers it on the next run with no duplicate.
concurrency:
  group: book-orders
  cancel-in-progress: true

jobs:
  book-orders:
    name: Create Shopify orders from Airtable book order tables
    runs-on: ubuntu-latest
    # GitHub's hard job cap is 6h. Stay safely under it; the loop self-exits first.
    timeout-minutes: 358
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run book orders on a loop
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_API_TOKEN: ${{ secrets.SHOPIFY_API_TOKEN }}
          BOOK_ORDER_TABLES: ${{ secrets.BOOK_ORDER_TABLES }}
          # Multi-base config (optional, JSON). Adds further Airtable bases on top
          # of the AIRTABLE_BASE_ID + BOOK_ORDER_TABLES base above. Unset = legacy
          # single-base behavior.
          BOOK_ORDER_BASES: ${{ secrets.BOOK_ORDER_BASES }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_BOOKS: ${{ secrets.SMTP_FROM_BOOKS }}
          BOOK_ORDER_INVOICE_FIELDS: ${{ secrets.BOOK_ORDER_INVOICE_FIELDS }}
          ERROR_EMAIL_TO: ${{ secrets.ERROR_EMAIL_TO }}
        # Loop the script every 10 min for ~5h50m, then exit so the next scheduled
        # start (or a still-running concurrent start) takes over. Real sleeps on a
        # live runner are never dropped, so this gives a genuine ~10-min cadence that
        # the bare `schedule:` trigger cannot. A failed iteration is logged and the
        # loop continues; the next scheduled start also bridges any gap if this job
        # ends or dies.
        run: |
          budget_end=$(( $(date +%s) + 350*60 ))
          while :; do
            echo "=== book_orders run at $(date -u +%FT%TZ) ==="
            python book_orders.py || echo "run failed; continuing loop"
            if [ $(( $(date +%s) + 600 )) -ge "$budget_end" ]; then
              echo "Approaching job time budget; exiting loop (next start resumes)."
              break
            fi
            sleep 600
          done
